<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- 第3页：诗歌简介与主题 -->
    
    <defs>
        <linearGradient id="introGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#005587"/>
            <stop offset="100%" stop-color="#2196F3"/>
        </linearGradient>
        
        <!-- 装饰渐变 -->
        <linearGradient id="decoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#005587" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#2196F3" stop-opacity="0.05"/>
        </linearGradient>
    </defs>
    
    <!-- 白色背景 -->
    <rect width="1280" height="720" fill="#FFFFFF"/>
    
    <!-- 装饰背景 -->
    <rect x="800" y="0" width="480" height="720" fill="url(#decoGrad)"/>
    
    <!-- 左侧装饰条 -->
    <rect x="0" y="0" width="12" height="720" fill="url(#introGrad)"/>
    <rect x="12" y="0" width="4" height="720" fill="#F5A623"/>
    
    <!-- 顶部标题区 -->
    <g transform="translate(60, 80)">
        <!-- 标题装饰 -->
        <rect x="0" y="-40" width="80" height="4" fill="#005587"/>
        <rect x="85" y="-40" width="50" height="2" fill="#2196F3"/>
        
        <!-- 页面标题 -->
        <text font-family="Microsoft YaHei, KaiTi, Arial" font-size="42" font-weight="bold" fill="#333333">
            <tspan x="0" dy="0">诗歌主题</tspan>
            <tspan x="200" dy="0" fill="#005587">与</tspan>
            <tspan x="240" dy="0">特点</tspan>
        </text>
        
        <!-- 副标题 -->
        <text x="0" y="60" font-family="Microsoft YaHei, Arial" font-size="20" fill="#666666">
            《时光之歌》的创作背景与文学特色
        </text>
    </g>
    
    <!-- 核心信息卡片 -->
    <g transform="translate(60, 180)">
        <!-- 卡片容器 -->
        <rect width="500" height="480" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5" rx="8"/>
        <rect width="6" height="480" fill="#005587" rx="3"/>
        
        <!-- 卡片标题 -->
        <text x="30" y="45" font-family="Microsoft YaHei, Arial" font-size="24" font-weight="bold" fill="#005587">
            📖 诗歌概述
        </text>
        
        <!-- 分隔线 -->
        <line x1="30" y1="70" x2="200" y2="70" stroke="#005587" stroke-width="2"/>
        <line x1="205" y1="70" x2="250" y2="70" stroke="#2196F3" stroke-width="1"/>
        
        <!-- 诗歌基本信息列表 -->
        <g transform="translate(30, 120)">
            <g>
                <rect width="24" height="24" fill="#005587" fill-opacity="0.1" rx="12"/>
                <text x="12" y="18" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="bold" fill="#005587">1</text>
                <text x="44" y="20" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#333333">核心主题</text>
                <text x="44" y="48" font-family="Microsoft YaHei, Arial" font-size="16" fill="#666666" fill-opacity="0.9">时间流逝与人生哲思</text>
            </g>
            
            <g transform="translate(0, 80)">
                <rect width="24" height="24" fill="#2196F3" fill-opacity="0.1" rx="12"/>
                <text x="12" y="18" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="bold" fill="#2196F3">2</text>
                <text x="44" y="20" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#333333">诗歌篇幅</text>
                <text x="44" y="48" font-family="Microsoft YaHei, Arial" font-size="16" fill="#666666" fill-opacity="0.9">18行现代诗歌，6个主题部分</text>
            </g>
            
            <g transform="translate(0, 160)">
                <rect width="24" height="24" fill="#4CAF50" fill-opacity="0.1" rx="12"/>
                <text x="12" y="18" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="bold" fill="#4CAF50">3</text>
                <text x="44" y="20" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#333333">语言风格</text>
                <text x="44" y="48" font-family="Microsoft YaHei, Arial" font-size="16" fill="#666666" fill-opacity="0.9">平实含蓄，深意绵长，现代诗意</text>
            </g>
            
            <g transform="translate(0, 240)">
                <rect width="24" height="24" fill="#005587" fill-opacity="0.1" rx="12"/>
                <text x="12" y="18" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="bold" fill="#005587">4</text>
                <text x="44" y="20" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#333333">修辞手法</text>
                <text x="44" y="48" font-family="Microsoft YaHei, Arial" font-size="16" fill="#666666" fill-opacity="0.9">比喻、对仗、拟人、意象并置</text>
            </g>
        </g>
    </g>
    
    <!-- 右侧特色展示 -->
    <g transform="translate(620, 180)">
        <!-- 卡片容器 -->
        <rect width="600" height="480" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5" rx="8"/>
        
        <!-- 卡片标题 -->
        <text x="30" y="45" font-family="Microsoft YaHei, Arial" font-size="24" font-weight="bold" fill="#2196F3">
            ✨ 诗歌特色
        </text>
        
        <!-- 分隔线 -->
        <line x1="30" y1="70" x2="200" y2="70" stroke="#2196F3" stroke-width="2"/>
        
        <!-- 特色矩阵 -->
        <g transform="translate(30, 120)">
            <!-- 特色1：哲理性 -->
            <g>
                <rect width="260" height="120" fill="#005587" fill-opacity="0.05" rx="6"/>
                <rect x="20" y="30" width="4" height="60" fill="#005587"/>
                <text x="40" y="40" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#005587">哲理性</text>
                <text x="40" y="70" font-family="Microsoft YaHei, Arial" font-size="14" fill="#666666">探讨时间本质与人生意义</text>
                <text x="40" y="95" font-family="Microsoft YaHei, Arial" font-size="12" fill="#999999">超越表象，触及深层思考</text>
            </g>
            
            <!-- 特色2：意象丰富 -->
            <g transform="translate(300, 0)">
                <rect width="260" height="120" fill="#2196F3" fill-opacity="0.05" rx="6"/>
                <rect x="20" y="30" width="4" height="60" fill="#2196F3"/>
                <text x="40" y="40" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#2196F3">意象丰富</text>
                <text x="40" y="70" font-family="Microsoft YaHei, Arial" font-size="14" fill="#666666">水流、织机、四季、历史长河</text>
                <text x="40" y="95" font-family="Microsoft YaHei, Arial" font-size="12" fill="#999999">多重意象构建诗意世界</text>
            </g>
            
            <!-- 特色3：结构严谨 -->
            <g transform="translate(0, 140)">
                <rect width="260" height="120" fill="#4CAF50" fill-opacity="0.05" rx="6"/>
                <rect x="20" y="30" width="4" height="60" fill="#4CAF50"/>
                <text x="40" y="40" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#4CAF50">结构严谨</text>
                <text x="40" y="70" font-family="Microsoft YaHei, Arial" font-size="14" fill="#666666">6部分渐进式主题展开</text>
                <text x="40" y="95" font-family="Microsoft YaHei, Arial" font-size="12" fill="#999999">从具体到抽象，层层深入</text>
            </g>
            
            <!-- 特色4：情感真挚 -->
            <g transform="translate(300, 140)">
                <rect width="260" height="120" fill="#005587" fill-opacity="0.05" rx="6"/>
                <rect x="20" y="30" width="4" height="60" fill="#005587"/>
                <text x="40" y="40" font-family="Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#005587">情感真挚</text>
                <text x="40" y="70" font-family="Microsoft YaHei, Arial" font-size="14" fill="#666666">对生命的关怀与对时间的敬畏</text>
                <text x="40" y="95" font-family="Microsoft YaHei, Arial" font-size="12" fill="#999999">触动心灵，引发共鸣</text>
            </g>
        </g>
    </g>
    
    <!-- 底部总结 -->
    <rect x="60" y="680" width="1160" height="30" fill="#F5F5F5" rx="4"/>
    <text x="80" y="700" font-family="Microsoft YaHei, Arial" font-size="14" fill="#666666">
        <tspan fill="#005587" font-weight="bold">核心价值：</tspan>
        通过现代诗歌形式，探讨永恒的时间主题，为当代读者提供精神启迪
    </text>
    
    <!-- 页脚 -->
    <line x1="60" y1="665" x2="1220" y2="665" stroke="#E0E0E0" stroke-width="1"/>
    <text x="60" y="705" font-family="Microsoft YaHei, Arial" font-size="14" fill="#999999">第 3 / 10 页</text>
    <text x="1220" y="705" text-anchor="end" font-family="Microsoft YaHei, Arial" font-size="12" fill="#999999">诗歌简介 · 时光之歌</text>
    
</svg>