    <circle cx="0" cy="0" r="110" fill="none" stroke="#4CA1E7" stroke-width="0.8" stroke-opacity="0.1" />
    <circle cx="0" cy="0" r="75" fill="none" stroke="#FFFFFF" stroke-width="0.6" stroke-opacity="0.05" />
  </g>

