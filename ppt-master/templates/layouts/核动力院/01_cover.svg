<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <clipPath id="coverClip">
      <rect width="1280" height="720"/>
    </clipPath>
  </defs>
  
  <image href="assets/image3.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  
  <rect x="0" y="180" width="1280" height="280" fill="#004999"/>
  
  <text x="640" y="280" fill="#FFFFFF" font-family="Microsoft YaHei, sans-serif" font-size="42" font-weight="bold" text-anchor="middle">
    {{TITLE}}
  </text>
  
  <text x="35" y="32" fill="#FFFFFF" font-family="Microsoft YaHei, sans-serif" font-size="16">
    {{CLASSIFICATION}}
  </text>
  
  <text x="640" y="580" fill="#FFFFFF" font-family="Microsoft YaHei, sans-serif" font-size="20" text-anchor="middle">
    {{DATE}}
  </text>
  
  <text x="640" y="520" fill="#FFFFFF" font-family="Microsoft YaHei, sans-serif" font-size="18" text-anchor="middle">
    {{AUTHOR}}
  </text>
  
  <g transform="translate(80, 640)">
    <image href="assets/image4.png" x="0" y="0" width="180" height="55" preserveAspectRatio="xMidYMid meet"/>
    <image href="assets/image5.png" x="240" y="0" width="180" height="55" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>