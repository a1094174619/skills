<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <rect x="0" y="0" width="1280" height="80" fill="#1F497D"/>
  
  <rect x="0" y="80" width="8" height="640" fill="#4F81BD"/>
  
  <text x="80" y="55" fill="#FFFFFF" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" font-weight="bold">
    {{CHAPTER_TITLE}}
  </text>
  
  <g transform="translate(80, 150)">
    <text x="0" y="0" fill="#1F497D" font-family="Arial, sans-serif" font-size="180" font-weight="bold" opacity="0.1">
      {{CHAPTER_NUM}}
    </text>
  </g>
  
  <text x="80" y="350" fill="#1F497D" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="48" font-weight="bold">
    {{CHAPTER_TITLE}}
  </text>
  
  <text x="80" y="400" fill="#666666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="18">
    {{CHAPTER_DESC}}
  </text>
  
  <g transform="translate(60, 600)">
    <image href="assets/image4.png" x="0" y="0" width="200" height="60" preserveAspectRatio="xMidYMid meet"/>
    <image href="assets/image5.png" x="240" y="0" width="200" height="60" preserveAspectRatio="xMidYMid meet"/>
  </g>
  
  <text x="1200" y="700" fill="#666666" font-family="Arial, sans-serif" font-size="12" text-anchor="end">
    {{PAGE_NUM}}
  </text>
</svg>