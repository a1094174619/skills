<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <rect x="0" y="0" width="1280" height="80" fill="#004999"/>
  
  <rect x="0" y="80" width="96" height="640" fill="#C4C7CB" opacity="0.9"/>
  
  <g transform="translate(143, 150)">
    <text x="0" y="0" fill="#004999" font-family="Times New Roman, serif" font-size="180" font-weight="bold" opacity="0.1">
      {{CHAPTER_NUM}}
    </text>
  </g>
  
  <text x="143" y="350" fill="#004999" font-family="Microsoft YaHei, sans-serif" font-size="48" font-weight="bold">
    {{CHAPTER_TITLE}}
  </text>
  
  <text x="143" y="400" fill="#666666" font-family="Microsoft YaHei, sans-serif" font-size="18">
    {{CHAPTER_DESC}}
  </text>
  
  <g transform="translate(80, 640)">
    <image href="assets/image4.png" x="0" y="0" width="180" height="55" preserveAspectRatio="xMidYMid meet"/>
    <image href="assets/image5.png" x="240" y="0" width="180" height="55" preserveAspectRatio="xMidYMid meet"/>
  </g>
  
  <text x="1200" y="700" fill="#666666" font-family="Times New Roman, serif" font-size="12" text-anchor="end">
    {{PAGE_NUM}}
  </text>
</svg>